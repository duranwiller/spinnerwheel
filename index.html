<!DOCTYPE html>
<html>
<head>
  <title>Preset Spinner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    canvas {
      margin-top: 30px;
      background: white;
      border-radius: 50%;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Spinner Wheel</h1>
  <canvas id="wheel" width="400" height="400"></canvas>
  <br>
  <button id="spinBtn">Spin</button>
  <div id="result"></div>

  <script>
    const options = [
      "Option 1",
      "Option 2",
      "Option 3",
      "Option 4",
      "Option 5",
      "Option 6",
      "Option 7",
      "Option 8"
    ];

    const targetIndex = 2; // lands on Option 3
    let used = localStorage.getItem("spinnerUsed") === "true";

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const result = document.getElementById("result");

    const center = 200;
    const radius = 190;
    const sliceAngle = (2 * Math.PI) / options.length;
    let currentAngle = 0;

    function drawWheel() {
      ctx.clearRect(0, 0, 400, 400);

      for (let i = 0; i < options.length; i++) {
        const start = currentAngle + i * sliceAngle;
        const end = start + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.fillStyle = i % 2 === 0 ? "#ffcc66" : "#66ccff";
        ctx.fill();
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + sliceAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText(options[i], radius - 15, 5);
        ctx.restore();
      }

      // pointer
      ctx.beginPath();
      ctx.moveTo(center - 15, 10);
      ctx.lineTo(center + 15, 10);
      ctx.lineTo(center, 45);
      ctx.fillStyle = "red";
      ctx.fill();
    }

    function spin() {
      if (used) {
        result.textContent = "You already used the spinner.";
        return;
      }

      used = true;
      localStorage.setItem("spinnerUsed", "true");

      const pointerAngle = -Math.PI / 2;
      const targetMiddleAngle = targetIndex * sliceAngle + sliceAngle / 2;
      const finalAngle = pointerAngle - targetMiddleAngle + 10 * Math.PI;

      const startAngle = currentAngle;
      const duration = 4000;
      const startTime = performance.now();

      function animate(time) {
        const progress = Math.min((time - startTime) / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 3);

        currentAngle = startAngle + finalAngle * easeOut;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          result.textContent = "Result: " + options[targetIndex];
        }
      }

      requestAnimationFrame(animate);
    }

    spinBtn.addEventListener("click", spin);

    drawWheel();

    if (used) {
      result.textContent = "You already used the spinner.";
    }
  </script>

</body>
</html>
